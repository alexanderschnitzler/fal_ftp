name: CI

on: [ push, pull_request ]

jobs:
  tests:
    name: "PHP ${{ matrix.php }} | TYPO3 ${{ matrix.typo3 }}"
    runs-on: ubuntu-22.04
    strategy:
      # This prevents cancellation of matrix job runs, if one/two already failed and let the
      # rest matrix jobs be executed anyway.
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5' ]
        typo3: [ '13.4', '14.3' ]
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl, mbstring, sodium, ftp
          coverage: none

      - name: Composer install (lowest)
        if: matrix.typo3 == '13.4'
        run: composer update --prefer-lowest --no-interaction --no-progress --prefer-dist

      - name: Composer install (highest)
        if: matrix.typo3 == '14.3'
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: phplint
        run: composer php:lint

      - name: phpstan
        run: composer php:stan -- --configuration=phpstan.${{ matrix.typo3 }}.neon

      - name: php-cs-fixer
        run: composer php:cs
